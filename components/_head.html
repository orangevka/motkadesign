<!--
  _head.html — общий <head> для всех страниц motka.design
  Вставлять содержимое ВНУТРЬ тега <head>.

  Плейсхолдеры (заменить для каждой страницы):
    {{PAGE_TITLE}}        — заголовок вкладки, напр. "About"
    {{META_DESCRIPTION}}  — описание страницы (до 160 символов)
    {{OG_TITLE}}          — og:title (обычно = PAGE_TITLE)
    {{OG_DESCRIPTION}}    — og:description
    {{OG_IMAGE}}          — абсолютный URL картинки для соцсетей
                            дефолт: https://cdn.prod.website-files.com/623a4d65378e3dda4dd20f87/687a348de666b1ebd114983f_OG.png
    {{CANONICAL_URL}}     — канонический URL страницы, напр. "about.html"
-->

<!-- ═══════════ PAGE-SPECIFIC META (заменить) ═══════════ -->
<meta charset="utf-8"/>
<title>{{PAGE_TITLE}}</title>
<meta content="{{META_DESCRIPTION}}" name="description"/>
<meta content="{{OG_TITLE}}" property="og:title"/>
<meta content="{{OG_DESCRIPTION}}" property="og:description"/>
<meta content="{{OG_IMAGE}}" property="og:image"/>
<meta content="{{OG_TITLE}}" property="twitter:title"/>
<meta content="{{OG_DESCRIPTION}}" property="twitter:description"/>
<meta property="og:type" content="website"/>
<meta content="summary_large_image" name="twitter:card"/>
<link href="{{CANONICAL_URL}}" rel="canonical"/>

<!-- ═══════════ VIEWPORT ═══════════ -->
<meta content="width=device-width, initial-scale=1" name="viewport"/>
